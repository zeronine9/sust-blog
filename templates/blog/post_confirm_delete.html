{% extends 'base.html' %}

{% block title %}Delete Post — DevBlog{% endblock %}

{% block content %}
<div class="container" style="max-width:560px;">
    <div class="card p-5 text-center">
        <div class="mb-4">
            <span style="font-size:4rem; color:var(--danger);">
                <i class="bi bi-exclamation-triangle-fill"></i>
            </span>
        </div>
        <h3 class="fw-bold mb-2">Delete Post?</h3>
        <p class="text-muted mb-4">
            Are you sure you want to permanently delete
            <strong>"{{ post.title }}"</strong>?
            This action cannot be undone.
        </p>
        <form method="POST">
            {% csrf_token %}
            <div class="d-flex gap-3 justify-content-center">
                <button type="submit" class="btn btn-danger px-4">
                    <i class="bi bi-trash me-2"></i>Yes, Delete
                </button>
                <a href="{% url 'post-detail' post.pk %}" class="btn btn-outline-secondary px-4">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
