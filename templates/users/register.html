{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Register — DevBlog{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-card card">
        <div class="card-header">
            <i class="bi bi-person-plus-fill fs-1 mb-2 d-block"></i>
            <h4>Create Your Account</h4>
            <p class="mb-0 small opacity-75">Join our community of writers today</p>
        </div>
        <div class="card-body p-4">
            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-3 py-2">
                    <i class="bi bi-check-circle me-2"></i>Create Account
                </button>
            </form>
            <hr style="border-color:var(--border);" class="my-4">
            <p class="text-center text-muted mb-0">
                Already have an account?
                <a href="{% url 'login' %}" class="text-accent fw-semibold text-decoration-none">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
