{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login — DevBlog{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-card card">
        <div class="card-header">
            <i class="bi bi-shield-lock-fill fs-1 mb-2 d-block"></i>
            <h4>Welcome Back</h4>
            <p class="mb-0 small opacity-75">Sign in to your DevBlog account</p>
        </div>
        <div class="card-body p-4">
            <form method="POST" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100 mt-3 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>
            <hr style="border-color:var(--border);" class="my-4">
            <p class="text-center text-muted mb-0">
                Don't have an account?
                <a href="{% url 'register' %}" class="text-accent fw-semibold text-decoration-none">Register now</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
